name: Android Build

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:3.2.3
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup Godot config and export templates
        run: |
          mkdir -p ~/.config/godot
          cp -r /root/.config/godot/* ~/.config/godot/ || true
          mkdir -p ~/.local/share/godot/templates
          cp -r /root/.local/share/godot/export_templates/3.2.3.stable ~/.local/share/godot/templates/3.2.3.stable
      - name: Build Android APK
        run: |
          mkdir -p build/android
          godot --headless --verbose --export-debug "Android" "build/android/LuoKaiOpenWorld-debug.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/android
