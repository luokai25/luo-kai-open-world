name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:3.2.3
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Install tools
        run: |
          apt-get update
          apt-get install -y curl unzip
      - name: Download Android export templates
        run: |
          mkdir -p ~/.local/share/godot/templates/3.2.3.stable
          curl -L -o /tmp/export_templates.zip "https://github.com/godotengine/godot/releases/download/3.2.3-stable/Godot_v3.2.3-stable_export_templates.tpz"
          unzip /tmp/export_templates.zip -d /tmp/godot_templates
          cp /tmp/godot_templates/templates/*.apk ~/.local/share/godot/templates/3.2.3.stable/
          ls -la ~/.local/share/godot/templates/3.2.3.stable/
      - name: Configure editor settings
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-3.tres << 'EOF'
          [gd_resource type="EditorSettings" format=2]

          [resource]
          export/android/adb = "/usr/bin/adb"
          export/android/jarsigner = "/usr/bin/jarsigner"
          export/android/debug_keystore = "/tmp/android-debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          export/android/java_sdk_path = "/usr/lib/jvm/java-17-openjdk-amd64"
          export/android/android_sdk_path = "/usr/lib/android-sdk"
          EOF
      - name: Build Android APK
        run: |
          keytool -genkeypair -keystore /tmp/android-debug.keystore -alias androiddebugkey -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US" -keyalg RSA -keysize 2048 -validity 10000 -storetype JKS
          mkdir -p build/android
          godot --headless --verbose --export-debug "Android" "build/android/LuoKaiOpenWorld-raw.apk"
      - name: Align and sign APK
        run: |
          zipalign -f -p 4 build/android/LuoKaiOpenWorld-raw.apk build/android/LuoKaiOpenWorld-aligned.apk
          apksigner sign \
            --ks /tmp/android-debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out build/android/LuoKaiOpenWorld.apk \
            build/android/LuoKaiOpenWorld-aligned.apk
          apksigner verify --verbose --print-certs build/android/LuoKaiOpenWorld.apk
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/android/LuoKaiOpenWorld.apk
