name: Android Build

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:3.2.3
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/
          mkdir -p ~/.config/godot
          echo "[gd_resource type=\"EditorSettings\" format=2]" > ~/.config/godot/editor_settings-3.tres
          echo "[resource]" >> ~/.config/godot/editor_settings-3.tres
          echo "export/android/adb = \"/usr/bin/adb\"" >> ~/.config/godot/editor_settings-3.tres
          echo "export/android/jarsigner = \"/usr/lib/jvm/java-17-openjdk-amd64/bin/jarsigner\"" >> ~/.config/godot/editor_settings-3.tres
          echo "export/android/debug_keystore = \"/root/debug.keystore\"" >> ~/.config/godot/editor_settings-3.tres
      - name: Build Android APK
        run: |
          mkdir -p build/android
          godot --headless --verbose --export "Android" "build/android/LuoKaiOpenWorld.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/android
